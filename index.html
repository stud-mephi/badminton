<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Первенство МИФИ | Турнир</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #bfbfdb; padding: 20px 12px 40px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .card { background: white; border-radius: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); margin-bottom: 28px; overflow: hidden; }
        .card-header { background: #0b0829; color: white; padding: 16px 20px; font-size: 1.3rem; font-weight: 700; }
        .card-body { padding: 20px; }
        .group-container { background: #fefefe; border-radius: 24px; margin-bottom: 30px; border: 1px solid #e0ddf5; }
        .group-title-bar { background: #eae9fc; padding: 12px 20px; font-weight: 700; font-size: 1.1rem; }
        .table-wrapper { overflow-x: auto; padding: 16px; }
        .tournament-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px; }
        .tournament-table th, .tournament-table td { border: 1px solid #d4d4e0; padding: 10px 8px; text-align: center; }
        .tournament-table th { background: #f5f4ff; font-weight: 700; }
        .player-col { font-weight: 700; background: #faf9ff; text-align: left !important; }
        .win-cell { background-color: #c8f0d1 !important; }
        .stats-col { background: #f5f3ff; font-weight: 600; }
        .refresh-panel { background: #f8f7fc; border-radius: 32px; padding: 18px; margin-bottom: 24px; border: 2px solid #cbc8e0; text-align: center; }
        .btn-primary { background: #0b0829; color: white; border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .status { font-size: 0.75rem; margin-top: 10px; padding: 6px; border-radius: 30px; }
        .status-success { background: #d4e0b2; color: #2b6e3c; }
        .status-error { background: #f0d6d6; color: #b91c1c; }
        .status-info { background: #e0ddf5; color: #4a3f7a; }
        .bracket-container { display: flex; flex-direction: column; gap: 24px; }
        .bracket-stage { background: #faf9ff; border-radius: 24px; padding: 16px; }
        .stage-title { font-weight: 800; margin-bottom: 16px; padding-left: 12px; border-left: 4px solid #0b0829; }
        .matches-list { display: flex; flex-direction: column; gap: 16px; }
        .match-card { background: white; border-radius: 20px; padding: 14px; border: 1px solid #e2defc; }
        .match-players-row { display: flex; gap: 12px; justify-content: space-between; margin-bottom: 10px; }
        .match-players-row span { flex: 1; text-align: center; font-weight: 600; }
        .match-score { text-align: center; background: #f1efff; padding: 8px; border-radius: 30px; font-family: monospace; }
        .winner-badge { background: #0b0829; color: white; padding: 6px; border-radius: 40px; text-align: center; font-size: 0.75rem; margin-top: 8px; }
        @media (min-width: 768px) { .bracket-container { flex-direction: row; flex-wrap: wrap; } .bracket-stage { flex: 1; } }
    </style>
</head>
<body>
<div class="container">
    <div style="text-align: center; margin-bottom: 20px;">
        <h1 style="font-size: 2.2rem; background: linear-gradient(135deg,#0b0829,#413a7c); background-clip: text; -webkit-background-clip: text; color: transparent;">🏸 Первенство МИФИ</h1>
        <p style="color: #4a457a;">Актуальные результаты турнира</p>
    </div>

    <div class="refresh-panel">
        <button id="refreshBtn" class="btn-primary">🔄 Обновить данные</button>
        <div id="status" class="status"></div>
        <div id="lastUpdate" class="status" style="font-size:0.7rem;"></div>
    </div>

    <div id="content"></div>
</div>

<script>
    const SHEETS = {
        maleGroups: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg8NHCSUuEByVlhTTyac8Es1yOp8Wbbx07-1LaJJkNdOhiQVyfqU9LyEd-AxVgCPKD14D5GFF4bKPs/pub?gid=0&single=true&output=csv',
        femaleGroups: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg8NHCSUuEByVlhTTyac8Es1yOp8Wbbx07-1LaJJkNdOhiQVyfqU9LyEd-AxVgCPKD14D5GFF4bKPs/pub?gid=390985909&single=true&output=csv',
        maleBracket: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg8NHCSUuEByVlhTTyac8Es1yOp8Wbbx07-1LaJJkNdOhiQVyfqU9LyEd-AxVgCPKD14D5GFF4bKPs/pub?gid=1498729870&single=true&output=csv',
        femaleBracket: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRg8NHCSUuEByVlhTTyac8Es1yOp8Wbbx07-1LaJJkNdOhiQVyfqU9LyEd-AxVgCPKD14D5GFF4bKPs/pub?gid=1603037245&single=true&output=csv'
    };
    
    let currentData = { maleGroups: [], femaleGroups: [], maleBracketStages: [], femaleBracketStages: [] };
    
    function determineWinner(scoreStr) {
        if (!scoreStr || scoreStr.trim() === "") return null;
        let parts = scoreStr.split(',').map(s => s.trim());
        let p1Wins = 0, p2Wins = 0;
        for (let part of parts) {
            let s = part.split(':');
            if (s.length === 2) {
                if (parseInt(s[0]) > parseInt(s[1])) p1Wins++;
                else if (parseInt(s[1]) > parseInt(s[0])) p2Wins++;
            }
        }
        if (p1Wins > p2Wins) return 1;
        if (p2Wins > p1Wins) return 2;
        return null;
    }
    
    function calcStats(group) {
        if (!group.players) return [];
        return group.players.map((_, i) => {
            let wins = 0, diff = 0;
            for (let j = 0; j < group.players.length; j++) {
                if (i === j) continue;
                let score = group.scores[i]?.[j];
                if (score && score.trim() !== "") {
                    if (determineWinner(score) === 1) wins++;
                    let myTotal = 0, oppTotal = 0;
                    score.split(',').forEach(p => {
                        let sc = p.split(':');
                        if (sc.length === 2) {
                            myTotal += parseInt(sc[0]) || 0;
                            oppTotal += parseInt(sc[1]) || 0;
                        }
                    });
                    diff += myTotal - oppTotal;
                }
            }
            return { wins, diff, totalGames: group.players.length - 1 };
        });
    }
    
    function parseCSV(csvText) {
        if (!csvText) return [];
        const rows = [];
        const lines = csvText.split(/\r?\n/);
        for (let line of lines) {
            if (line.trim() === "") {
                rows.push([]);
                continue;
            }
            const cells = [];
            let inQuote = false;
            let currentCell = "";
            for (let i = 0; i < line.length; i++) {
                const ch = line[i];
                if (ch === '"') {
                    inQuote = !inQuote;
                } else if (ch === ',' && !inQuote) {
                    cells.push(currentCell);
                    currentCell = "";
                } else {
                    currentCell += ch;
                }
            }
            cells.push(currentCell);
            rows.push(cells.map(cell => cell.trim()));
        }
        return rows;
    }
    
    function parseGroups(csvText) {
        const rows = parseCSV(csvText);
        if (rows.length === 0) return [];
        
        const groups = [];
        let i = 0;
        
        while (i < rows.length) {
            if (rows[i].length === 0 || (rows[i].length === 1 && rows[i][0] === "")) {
                i++;
                continue;
            }
            
            const firstRow = rows[i];
            const isGroupRow = firstRow[0] && firstRow[0].match(/[А-Яа-я]/) && 
                               (firstRow[0].includes("Группа") || (firstRow[1] && firstRow[1].match(/[А-Яа-я]/)));
            
            if (isGroupRow && firstRow[1] && firstRow[1].trim() !== "") {
                const players = [];
                for (let j = 1; j < firstRow.length; j++) {
                    if (firstRow[j] && firstRow[j].trim() !== "") {
                        players.push(firstRow[j].trim());
                    }
                }
                
                if (players.length > 0) {
                    const group = {
                        name: firstRow[0].trim(),
                        players: players,
                        scores: Array(players.length).fill().map(() => Array(players.length).fill(""))
                    };
                    
                    i++;
                    while (i < rows.length && rows[i].length > 0 && rows[i][0] && rows[i][0].trim() !== "") {
                        const resultRow = rows[i];
                        const playerName = resultRow[0].trim();
                        const playerIdx = group.players.findIndex(p => p === playerName);
                        
                        if (playerIdx !== -1) {
                            for (let j = 1; j < resultRow.length && j <= players.length; j++) {
                                if (resultRow[j] && resultRow[j].trim() !== "") {
                                    group.scores[playerIdx][j-1] = resultRow[j];
                                }
                            }
                        }
                        i++;
                    }
                    groups.push(group);
                    continue;
                }
            }
            i++;
        }
        
        return groups;
    }
    
    // ИСПРАВЛЕННЫЙ ПАРСИНГ СЕТОК
    function parseBracket(csvText) {
        const rows = parseCSV(csvText);
        
        // Создаём три стадии
        const stages = {
            'Четвертьфиналы': [],
            'Полуфиналы': [],
            'Финал': []
        };
        
        if (rows.length < 2) return [
            { name: "Четвертьфиналы", matches: [] },
            { name: "Полуфиналы", matches: [] },
            { name: "Финал", matches: [] }
        ];
        
        // Пропускаем заголовок (строка 0)
        for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row[0] || row[0].trim() === "") continue;
            
            const stageNameFull = row[0].trim().toLowerCase();
            let stageKey = null;
            
            if (stageNameFull.includes('четвертьфинал')) stageKey = 'Четвертьфиналы';
            else if (stageNameFull.includes('полуфинал')) stageKey = 'Полуфиналы';
            else if (stageNameFull.includes('финал')) stageKey = 'Финал';
            
            if (stageKey && row[1] && row[1].trim()) {
                stages[stageKey].push({
                    p1: row[1] || "",
                    p2: row[2] || "",
                    score: row[3] || "",
                    winner: row[4] || ""
                });
            }
        }
        
        // Возвращаем в нужном порядке
        return [
            { name: "Четвертьфиналы", matches: stages['Четвертьфиналы'] },
            { name: "Полуфиналы", matches: stages['Полуфиналы'] },
            { name: "Финал", matches: stages['Финал'] }
        ];
    }
    
    function renderGroups(groups, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        
        if (groups.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#888;">📭 Нет данных. Заполните Google таблицу.</div>';
            return;
        }
        
        groups.forEach(group => {
            const n = group.players.length;
            const stats = calcStats(group);
            
            let html = `<div class="group-container">
                <div class="group-title-bar">${escapeHtml(group.name)}</div>
                <div class="table-wrapper">
                <table class="tournament-table">
                    <thead><tr><th>Игроки</th>`;
            for (let i = 0; i < n; i++) html += `<th>${escapeHtml(group.players[i])}</th>`;
            html += `<th>В/П</th><th>Разница</th></tr></thead><tbody>`;
            
            for (let i = 0; i < n; i++) {
                html += `<tr><td class="player-col">${escapeHtml(group.players[i])}</td>`;
                for (let j = 0; j < n; j++) {
                    if (i === j) html += '<td>—</td>';
                    else {
                        const val = group.scores[i]?.[j] || '';
                        const cls = determineWinner(val) === 1 ? 'win-cell' : '';
                        html += `<td class="${cls}">${escapeHtml(val)}</td>`;
                    }
                }
                html += `<td class="stats-col">${stats[i].wins}/${stats[i].totalGames - stats[i].wins}</td>`;
                html += `<td class="stats-col">${stats[i].diff}</td></tr>`;
            }
            html += `</tbody></table></div></div>`;
            container.innerHTML += html;
        });
    }
    
    function renderBracket(stages, containerId) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        
        stages.forEach(stage => {
            let html = `<div class="bracket-stage">
                <div class="stage-title">🏆 ${stage.name}</div>
                <div class="matches-list">`;
            
            if (stage.matches.length === 0) {
                html += `<div style="text-align:center; padding:20px; color:#888;">📭 Нет данных</div>`;
            } else {
                stage.matches.forEach(match => {
                    html += `<div class="match-card">
                        <div class="match-players-row">
                            <span>${escapeHtml(match.p1) || '—'}</span>
                            <span>⚡</span>
                            <span>${escapeHtml(match.p2) || '—'}</span>
                        </div>
                        <div class="match-score">${escapeHtml(match.score) || '—'}</div>
                        <div class="winner-badge">🏅 ${match.winner ? escapeHtml(match.winner) : '—'}</div>
                    </div>`;
                });
            }
            html += `</div></div>`;
            container.innerHTML += html;
        });
    }
    
    function renderAll() {
        const content = document.getElementById('content');
        content.innerHTML = `
            <div class="card"><div class="card-header">🏸 Мужской одиночный разряд · Групповой этап</div><div class="card-body" id="maleGroups"></div></div>
            <div class="card"><div class="card-header">🏆 Мужская олимпийская сетка · Плей-офф</div><div class="card-body"><div id="maleBracket" class="bracket-container"></div></div></div>
            <div class="card"><div class="card-header">🏸 Женский одиночный разряд · Групповой этап</div><div class="card-body" id="femaleGroups"></div></div>
            <div class="card"><div class="card-header">🥈 Женская олимпийская сетка · Плей-офф</div><div class="card-body"><div id="femaleBracket" class="bracket-container"></div></div></div>
        `;
        renderGroups(currentData.maleGroups, 'maleGroups');
        renderGroups(currentData.femaleGroups, 'femaleGroups');
        renderBracket(currentData.maleBracketStages, 'maleBracket');
        renderBracket(currentData.femaleBracketStages, 'femaleBracket');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }
    
    async function fetchSheet(url, name) {
        try {
            const response = await fetch(url + '&t=' + Date.now());
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            return await response.text();
        } catch (e) {
            console.error(`Ошибка ${name}:`, e);
            return '';
        }
    }
    
    async function loadAllData() {
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = '⏳ Загрузка данных...';
        statusDiv.className = 'status status-info';
        
        try {
            const [maleGroupsCSV, femaleGroupsCSV, maleBracketCSV, femaleBracketCSV] = await Promise.all([
                fetchSheet(SHEETS.maleGroups, 'maleGroups'),
                fetchSheet(SHEETS.femaleGroups, 'femaleGroups'),
                fetchSheet(SHEETS.maleBracket, 'maleBracket'),
                fetchSheet(SHEETS.femaleBracket, 'femaleBracket')
            ]);
            
            currentData.maleGroups = parseGroups(maleGroupsCSV);
            currentData.femaleGroups = parseGroups(femaleGroupsCSV);
            currentData.maleBracketStages = parseBracket(maleBracketCSV);
            currentData.femaleBracketStages = parseBracket(femaleBracketCSV);
            currentData.lastUpdate = new Date().toLocaleString();
            
            renderAll();
            
            statusDiv.innerHTML = `✅ Загружено! Мужских групп: ${currentData.maleGroups.length}, Женских: ${currentData.femaleGroups.length}`;
            statusDiv.className = 'status status-success';
            document.getElementById('lastUpdate').innerHTML = `Обновлено: ${currentData.lastUpdate}`;
            setTimeout(() => { if(statusDiv) statusDiv.innerHTML = ''; }, 4000);
        } catch (error) {
            statusDiv.innerHTML = '❌ Ошибка загрузки';
            statusDiv.className = 'status status-error';
        }
    }
    
    document.getElementById('refreshBtn').addEventListener('click', loadAllData);
    loadAllData();
</script>
</body>
</html>
